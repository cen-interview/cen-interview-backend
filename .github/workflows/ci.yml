name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Import smoke test (각 패키지가 import 단계에서 깨지지 않는지)
        run: |
          uv run python -c "import interview.schemas.events"
          uv run python -c "import interview.schemas.question"
          uv run python -c "import interview.schemas.signals"
          uv run python -c "import interview.schemas.evidence"
          uv run python -c "import interview.schemas.report"
          uv run python -c "import interview.strategy"
          uv run python -c "import interview.evidence"
          uv run python -c "import interview.assessment"
          uv run python -c "import interview.interviewer"

      - name: Run tests
        run: uv run pytest
