services:
  postgres:
    image: ankane/pgvector
    container_name: cen-interview-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: interviewdb
    volumes:
      - cen_interview_pgdata:/var/lib/postgresql/data
      - ./init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interviewdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME}/interview-agent:${IMAGE_TAG}
    container_name: interview-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /home/ubuntu/data:/app/data:ro
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: interview-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  cen_interview_pgdata:
    name: cen_interview_pgdata